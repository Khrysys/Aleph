name: Daily Checks

on:
  schedule:
    - cron: '0 0 * * *'


permissions:
  contents: none

concurrency:
  group: action-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clusterfuzzlite:
    name: ClusterFuzzLite (${{ matrix.mode }}, ${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        mode:
          - batch
        sanitizer:
          - address

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
        
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Fuzzer
        uses: ./.github/actions/clusterfuzzlite
        with:
          mode: ${{ matrix.mode }}
          fuzz-seconds: 600
          sanitizer: ${{ matrix.sanitizer }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

  codeql:
    name: CodeQL Analysis
    uses: ./.github/workflows/codeql.yml
    concurrency:
      group: action-CodeQL Analysis-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

  osv-scanner:
    name: OSV Scanner
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c5996e0193a3df57d695c1b8a1dec2a4c62e8730 # v2.3.3
    permissions:
      # Required to upload SARIF file to CodeQL. See: https://github.com/github/codeql-action/issues/2117
      actions: read
      contents: read
      security-events: write

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    concurrency:
      group: action-OpenSSF Scorecard-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
        
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ./.github/actions/scorecard