name: Code Quality

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - staging

permissions: read-all

jobs:
  cpp-linter:
    name: C++ Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Run cpp-linter
        uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: file
          tidy-checks: '-*'
          version: '22'
          lines-changed-only: false
          thread-comments: true

      - name: Fail if issues found
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
 
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
 
      - name: Run cppcheck
        run: |
          cppcheck \
          --enable=all \
          --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          --inline-suppr \
          .
  codespell:
    name: codespell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
 
      - name: Install codespell
        run: pip install codespell
 
      - name: Run codespell
        run: |
          codespell \
            --skip="../.git" \
            --ignore-words-list="aleph" \
            .

  cmake-lint:
    name: CMake Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
 
      - name: Install cmake-lint
        run: pip install cmakelang[YAML]
 
      - name: Run cmake-lint
        run: |
          find . \( -name 'CMakeLists.txt' -o -name '*.cmake' \) \
            -not -path './build/*' \
            -not -path './.conan/*' \
            -print0 \
            | xargs -0 cmake-lint -c ./.cmake-lint