name: Push

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: none

concurrency:
  group: action-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    uses: ./.github/workflows/codeql.yml
    concurrency:
      group: action-CodeQL Analysis-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
        
  scorecard:
    name: OpenSSF Scorecard
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    concurrency:
      group: action-OpenSSF Scorecard-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
        
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          repo_token: ${{ github.token }}
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@603b797f8b14b413fe025cd935a91c16c4782713 # v3.33.0
        with:
          sarif_file: results.sarif

  clusterfuzzlite:
    name: ClusterFuzzLite (code-change, address)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: action-ClusterFuzzLite-code-change-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
        
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Fuzzer
        uses: ./.github/actions/clusterfuzzlite
        with:
          mode: code-change
          fuzz-seconds: 300
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}